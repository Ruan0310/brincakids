<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#f56298,#fcba05);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#ff4ecd;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p>Não tem conta? <a href="registrar.html">Registrar</a></p>
</div>

<script>
function login(){

    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    // 🔴 ADMIN FIXO
    if(email === "admin@brincakids.com" && senha === "Admin@123"){
        localStorage.setItem("logado", "true");
        localStorage.setItem("admin", "true");
        window.location.href = "index.html";
        return;
    }

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    let usuarioEncontrado = usuarios.find(u => u.email === email && u.senha === senha);

    if(usuarioEncontrado){
        localStorage.setItem("usuarioLogado", JSON.stringify(usuarioEncontrado));
        localStorage.setItem("logado", "true");
        localStorage.removeItem("admin");
        window.location.href = "index.html";
    } else {
        alert("Email ou senha incorretos!");
    }
}
</script>

</body>
</html>
