<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brinca Kids By Ruan - Diversão que Pula Alto!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff4ecd;
    --secondary: #ffcc00;
}

/* ===== FUNDO ===== */
body {
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(135deg, #f56298, #fcba05);
    color: #333;
    overflow-x: hidden;
}

/* ===== NAV ===== */
nav{
    position:relative;
    z-index:3;
    background:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav .links a{
    text-decoration:none;
    font-weight:bold;
    margin-left:20px;
    color:var(--primary);
}

/* ===== ESTEIRAS ===== */
.esteira-container {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}

.esteira {
    display: flex;
    position: absolute;
}

.esteira img {
    width: 280px;
    height: 180px;
    object-fit: cover;
    margin-right: 20px;
    border-radius: 15px;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

@keyframes mover1 { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes mover2 { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes mover3 { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

.esteira1 { top: 10%; animation: mover1 80s linear infinite; }
.esteira2 { top: 40%; animation: mover2 100s linear infinite; }
.esteira3 { top: 70%; animation: mover3 120s linear infinite; }

/* ===== HEADER ===== */
header {
    background: linear-gradient(90deg,var(--primary),var(--secondary));
    text-align:center;
    padding:25px;
    position: relative;
    z-index: 2;
}

header img {
    max-width:170px;
    border-radius:60%;
    border: 3px solid white;
}

/* ===== CONTAINER ===== */
.container {
    max-width:1100px;
    margin:auto;
    padding:30px 20px;
    position: relative;
    z-index: 2;
}

/* ===== CARDS ===== */
.card {
    background:white;
    padding:40px;
    border-radius:28px;
    margin-bottom:40px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

h2 { color: var(--primary); }

/* ===== GALERIA ===== */
.galeria {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    margin-top:25px;
}

.galeria-item {
    overflow:hidden;
    border-radius:22px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.galeria-item img {
    width:100%;
    height:240px;
    object-fit:cover;
    transition: transform 0.3s ease;
}
.galeria-item:hover img { transform: scale(1.08); }

/* ===== BOTÃO ===== */
.btn {
    display:inline-block;
    background:linear-gradient(45deg,#25d366,#128c7e);
    color:white;
    padding:18px 45px;
    border-radius:60px;
    font-weight:bold;
    text-decoration:none;
}

/* ===== FOOTER ===== */
footer {
    background:#1f1f1f;
    color:white;
    text-align:center;
    padding:20px;
    position: relative;
    z-index: 2;
}

@media (max-width:700px){
    .galeria { grid-template-columns: repeat(2,1fr); }
    .galeria-item img { height:170px; }
    .esteira img { width:180px; height:120px; margin-right:12px; }
    header img { max-width:100px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>

<script>
let logado = localStorage.getItem("logado");
let admin = localStorage.getItem("admin");
let usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));

if(logado === "true"){

    let nome = admin ? "Administrador" : usuarioLogado.usuario;

    let adminLink = admin ? `<a href="admin.html">Admin</a>` : "";

    document.getElementById("navLinks").innerHTML = `

        ${adminLink}
        <span>Olá, ${nome}</span>
        <a href="#" onclick="logout()">Sair</a>

}

function logout(){
    localStorage.clear();
    location.reload();
}
